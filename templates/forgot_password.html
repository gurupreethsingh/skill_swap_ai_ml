{% extends "base.html" %}
{% block title %}Forgot Password | SkillSwap AI{% endblock %}

{% block content %}
<section class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="auth-card glass-card">
          <div class="text-center mb-4">
            <span class="brand-logo mx-auto mb-3"><i class="bi bi-key-fill"></i></span>
            <h2 class="fw-black mb-1">Forgot password?</h2>
            <p class="text-muted">Enter your email to generate a local reset link.</p>
          </div>

          <form method="POST">
            <div class="mb-4">
              <label class="form-label">Registered Email</label>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required>
            </div>

            <button class="premium-btn premium-btn-primary w-100" type="submit">
              Generate Reset Link
            </button>
          </form>

          {% if reset_link %}
            <div class="alert alert-success mt-4 mb-0">
              <strong>Reset Link:</strong><br>
              <a href="{{ reset_link }}">{{ reset_link }}</a>
            </div>
          {% endif %}

          <div class="text-center mt-4">
            <a class="fw-bold" href="{{ url_for('login') }}">Back to login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
