{% extends "base.html" %}
{% block title %}Reset Password | SkillSwap AI{% endblock %}

{% block content %}
<section class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="auth-card glass-card">
          <div class="text-center mb-4">
            <span class="brand-logo mx-auto mb-3"><i class="bi bi-shield-lock-fill"></i></span>
            <h2 class="fw-black mb-1">Reset password</h2>
            <p class="text-muted">Create a new secure password for your account.</p>
          </div>

          <form method="POST">
            <div class="mb-4">
              <label class="form-label">New Password</label>
              <input type="password" name="new_password" class="form-control form-control-lg" placeholder="Enter new password" required>
            </div>

            <button class="premium-btn premium-btn-primary w-100" type="submit">
              Reset Password
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
